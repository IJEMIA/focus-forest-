<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Focus Forest - Jardín de Enfoque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pantalla de bienvenida -->
    <div id="welcome-screen">
        <div class="welcome-card">
            <div class="welcome-icon">🌳</div>
            <h1>Focus Forest</h1>
            <p>Tu jardín de concentración y recompensa</p>
            <input type="text" id="user-name" placeholder="Tu nombre" maxlength="30" autocomplete="off">
            <button id="start-btn" class="btn-primary">🌱 Comenzar mi jardín</button>
            <p class="cheat-hint">🎮 Modo prueba: escribe "23"</p>
        </div>
    </div>

    <!-- Overlay de bloqueo -->
    <div id="blocker">
        <div class="blocker-content">
            <div class="lock-icon">🔒</div>
            <h1>Modo Enfoque</h1>
            <p id="blocker-message">Estás cultivando tu concentración</p>
            <div class="timer-display">
                <span id="timer">00:00</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="progress-percentage">0%</div>
            </div>
            <div class="blocker-footer">
                <p>⚠️ No cierres ni cambies de aplicación</p>
                <p class="small-text">El contador se reiniciará si lo haces</p>
            </div>
        </div>
    </div>

    <!-- Interfaz principal -->
    <div id="main-app" style="display: none;">
        <div class="container">
            <!-- Panel superior: stats rápidos -->
            <div class="quick-stats glass">
                <div class="stat-badge">
                    <span class="stat-emoji">🌲</span>
                    <span class="stat-number" id="tree-count">0</span>
                </div>
                <div class="stat-badge">
                    <span class="stat-emoji">🐾</span>
                    <span class="stat-number" id="animal-count">0</span>
                </div>
                <div class="stat-badge">
                    <span class="stat-emoji">🏠</span>
                    <span class="stat-number" id="house-count">0</span>
                </div>
                <div class="stat-badge">
                    <span class="stat-emoji">⏱️</span>
                    <span class="stat-number" id="total-time">0</span>
                </div>
            </div>

            <!-- Panel de pestañas -->
            <div class="tabs-container glass">
                <button id="tab-trees" class="tab-btn active">🌳 Plantas</button>
                <button id="tab-animals" class="tab-btn">🐾 Animales</button>
                <button id="tab-houses" class="tab-btn">🏠 Casas</button>
            </div>

            <!-- Lista de elementos según pestaña -->
            <div id="tree-list" class="items-grid"></div>
            <div id="animal-list" class="items-grid" style="display: none;"></div>
            <div id="house-list" class="items-grid" style="display: none;"></div>

            <!-- Jardín -->
            <div class="garden-container glass">
                <div class="garden-header">
                    <h3 id="garden-title">🌱 Mi Jardín</h3>
                    <div class="garden-controls-top">
                        <button id="toggle-coloring-mode" class="btn-small btn-secondary">🎨</button>
                        <button id="clear-garden" class="btn-small btn-danger">🗑️</button>
                    </div>
                </div>
                <div class="garden-area" id="garden-area">
                    <canvas id="garden-canvas" class="garden-canvas"></canvas>
                    <div id="entities-overlay" class="entities-overlay"></div>
                </div>
                <div class="color-picker-bar">
                    <input type="color" id="brush-color" value="#4caf50">
                    <span>Color pincel</span>
                    <button id="reset-all-colors" class="btn-small btn-secondary">Reset suelo</button>
                </div>
            </div>

            <!-- Panel de selección actual -->
            <div class="selected-panel glass">
                <div id="selected-display" class="selected-card">
                    <div class="selected-emoji">🌲</div>
                    <div class="selected-info">
                        <span class="selected-name">Selecciona algo</span>
                        <span class="selected-cost">---</span>
                    </div>
                </div>
                <button id="start-entity-btn" class="btn-primary start-btn">🌱 COMENZAR ENFOQUE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
